<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Dashboard | EduGalaxy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dash-body">

    <canvas id="dashCanvas"></canvas>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">Edu<span>Galaxy</span></div>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i> Home</a>
        </nav>
        <div class="sidebar-footer">
            <a href="login.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-nav">
            <div class="nav-left">
                <h2>Student <span class="glow-text">Information System</span></h2>
            </div>
            <div id="status-msg" class="status-hidden">Success!</div>
        </header>

        <section class="glass-card form-section animate-fade">
            <div class="card-header">
                <h3 id="form-title">Student Registration</h3>
                <p>Fill in the academic credentials below</p>
            </div>
            <div class="stats-container">

  <div class="stat-card">
    <h3>Total Students</h3>
    <p id="total-count">0</p>
  </div>

  <div class="stat-card">
    <h3>Male</h3>
    <p id="male-count">0</p>
  </div>

  <div class="stat-card">
    <h3>Female</h3>
    <p id="female-count">0</p>
  </div>

  <div class="stat-card">
    <h3>Other</h3>
    <p id="other-count">0</p>
  </div>

</div>
            <form id="student-form" class="grid-form">
                <input type="hidden" id="student-id">
                
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Aryan Ubale" required>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="aryan@example.com" required>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+91 XXXXX XXXXX" required>
                </div>

                <div class="input-group">
                    <label>Course</label>
                    <select id="course" required>
                        <option value="" disabled selected>Select Course</option>
                        <option value="BTech">B.Tech (CS/IT)</option>
                        <option value="BCA">BCA</option>
                        <option value="MCA">MCA</option>
                        <option value="BSc">B.Sc Data Science</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>

                <div class="input-group">
                    <label>Enrollment Date</label>
                    <input type="date" id="enrollment_date" required>
                </div>

                <div class="input-group full-width">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="Male" required> Male</label>
                        <label><input type="radio" name="gender" value="Female"> Female</label>
                        <label><input type="radio" name="gender" value="Other"> Other</label>
                    </div>
                </div>

                <div class="input-group full-width">
                    <label>Address</label>
                    <textarea id="address" rows="2" placeholder="Permanent Address..."></textarea>
                </div>

                <div class="form-actions full-width">
                    <button type="submit" id="submit-btn" class="btn-primary">Add Student</button>
                    <button type="button" id="cancel-btn" class="btn-secondary hidden">Cancel Update</button>
                </div>
            </form>
        </section>
<input 
  type="text" 
  id="search-input" 
  placeholder="🔍 Search by name or email..."
  style="padding:10px; width:250px; margin-bottom:15px; border-radius:8px;"
    
  
  ><button id="export-btn" class="btn btn-glow">
  📥 Export CSV
</button>
        <section class="glass-card table-section mt-30">
            <div class="table-responsive">
                <table class="modern-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Course</th>
                            <th>Gender</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
